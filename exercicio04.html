<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabela de precificação</title>
</head>
<body>
  <h1>tabela de precificação de planos</h1>
  <table border="1">
  <thead>

<tr>
    <th>plano</th>
    <th>espaço</th>
    <th>preço</th>
</tr>
</thead>
<tbody>
    <tr>
        <td>basic</td>
        <td>10 GB</td>
        <td>gratis</td>
    </tr>
    <tr>
        <td>profissional</td>
        <td>100 GB </td>
         <td>R$ 49/mês</td>  
    </tr>
    <tr>
        <td>interprise</td>
        <td>1 TB</td>
        <td>R$ 199/mês</td>
    </tr>
</tbody>
<tfoot>
    <tr>
        <td colspan="3">
            valores sujeitos a alterações sem aviso prévio.
        </td>
        
    </tr>
</tfoot>
  </table>
  















</body>
</html>
